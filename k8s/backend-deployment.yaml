apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app.kubernetes.io/name: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
    spec:
      priorityClassName: high-priority
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: backend
              topologyKey: 'kubernetes.io/hostname'
      containers:
        - name: backend
          image: ghcr.io/REPO_OWNER/backend_service:will-be-overwritten-by-ci
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: '200Mi'
              cpu: '50m'
            limits:
              memory: '800Mi'
              cpu: '500m'
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: backend-secret
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            timeoutSeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
      imagePullSecrets:
        - name: ghcr-secret
