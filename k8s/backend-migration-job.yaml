apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration
spec:
  ttlSecondsAfterFinished: 120
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: backend-migration
    spec:
      restartPolicy: Never
      priorityClassName: migration-priority
      containers:
        - name: backend-migration
          image: ghcr.io/${REPO_OWNER}/backend_service:${IMAGE_TAG} # substituted by CI via envsubst
          command: ['/bin/sh', '-c']
          args: ['npm run migrate:up']
          resources:
            requests:
              memory: '1Gi'
              cpu: '500m'
            limits:
              memory: '2Gi'
              cpu: '1'
          envFrom:
            - secretRef:
                name: backend-secret
      imagePullSecrets:
        - name: ghcr-secret
