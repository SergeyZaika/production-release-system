name: cleanup closed release pull requests

on:
  pull_request:
    types: [closed]
    branches:
      - stage
      - dev

permissions:
  contents: write

jobs:
  delete_rc_branch:
    runs-on: ubuntu-latest

    steps:
      - name: Delete RC branch if PR was closed (not merged)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // only CLOSED, NOT merged
            if (pr.merged) {
              core.info("PR was merged — do nothing");
              return;
            }

            const branch = pr.head.ref;

            // only CI branches
            if (!branch.startsWith("release/rc/")) {
              core.info(`Not RC branch: ${branch}`);
              return;
            }

            core.info(`Deleting RC branch: ${branch}`);

            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`
            });

            core.notice(`RC branch deleted: ${branch}`);
