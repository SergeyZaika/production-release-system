name: create-release-tag

on:
  push:
    branches:
      - stage

permissions:
  contents: write
  pull-requests: read
  issues: read

env:
  RC_BRANCH_PREFIX: "release/rc/"
  TAG_LABEL_PREFIX: "tag:"
  TAG_PREFIX: "v"

jobs:
  tag_and_release:
    # Do not run in dev even if this workflow file exists there
    if: github.ref_name != 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Guard allowed target branch only
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            stage|prod-*) echo "Release branch: ${GITHUB_REF_NAME}" ;;
            *) echo "Skip: not a release branch: ${GITHUB_REF_NAME}"; exit 0 ;;
          esac

      - name: Get GitHub App token
        id: bot
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot.outputs.token }}

      - name: Find merged RC PR for this merge commit (otherwise exit)
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.bot.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const baseBranch = process.env.GITHUB_REF_NAME;

            const resp = await github.request('GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls', {
              owner,
              repo,
              commit_sha: sha,
              mediaType: { previews: ['groot'] }
            });

            const prs = resp.data || [];

            const merged = prs.find(p =>
              p.merged_at &&
              p.merge_commit_sha === sha &&
              p.base?.ref === baseBranch &&
              p.head?.ref?.startsWith(process.env.RC_BRANCH_PREFIX)
            );

            if (!merged) {
              core.notice(`Skip: commit ${sha} is not a merge of release/rc/* PR into ${baseBranch}.`);
              core.setOutput('should_release', 'false');
              return;
            }

            const prFull = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: merged.number
            });

            const labels = (prFull.data.labels || []).map(l => l.name).filter(Boolean);

            core.setOutput('should_release', 'true');
            core.setOutput('pr_number', String(merged.number));
            core.setOutput('pr_head_ref', merged.head?.ref || '');
            core.setOutput('pr_labels', JSON.stringify(labels));

      - name: Stop if not a merged RC PR
        if: steps.pr.outputs.should_release != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skip: not a merged release/rc/* PR into this branch."
          exit 0

      - name: Extract tag from PR label (tag:vX.Y.Z) (no grep)
        if: steps.pr.outputs.should_release == 'true'
        id: tag
        uses: actions/github-script@v7
        env:
          PR_LABELS_JSON: ${{ steps.pr.outputs.pr_labels }}
          TAG_LABEL_PREFIX: ${{ env.TAG_LABEL_PREFIX }}
          TAG_PREFIX: ${{ env.TAG_PREFIX }}
        with:
          script: |
            const labels = JSON.parse(process.env.PR_LABELS_JSON || "[]");
            const prefix = process.env.TAG_LABEL_PREFIX || "tag:";
            const tagLabel = labels.find(l => typeof l === "string" && l.startsWith(prefix));

            if (!tagLabel) {
              core.setFailed(`Could not find tag label '${prefix}vX.Y.Z' on PR.`);
              return;
            }

            const tag = tagLabel.slice(prefix.length).trim();
            if (!new RegExp(`^${process.env.TAG_PREFIX}\\d+\\.\\d+\\.\\d+$`).test(tag)) {
              core.setFailed(`Invalid tag value from label: '${tag}'. Expected vX.Y.Z`);
              return;
            }

            core.setOutput('tag', tag);
            core.info(`Extracted tag from label: ${tag}`);

      - name: Ensure tag does not already exist
        if: steps.pr.outputs.should_release == 'true'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG} (skip)"
            exit 0
          fi

      - name: Create annotated git tag and push
        if: steps.pr.outputs.should_release == 'true'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release (idempotent)
        if: steps.pr.outputs.should_release == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.bot.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "${{ steps.tag.outputs.tag }}";
            const prNumber = Number("${{ steps.pr.outputs.pr_number }}");

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.notice(`GitHub Release already exists for ${tag} (skip).`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              body: pr.data.body || '',
              draft: false,
              prerelease: false
            });

            core.notice(`GitHub Release created: ${tag}`);
